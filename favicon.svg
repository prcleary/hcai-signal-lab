<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="HCAI Signal Lab">
  <title>HCAI Signal Lab</title>
  <rect x="2" y="2" width="60" height="60" rx="10" ry="10" fill="#003087"/>
  <!-- White medical cross conveying "hospital" -->
  <path d="M26 12h12v14h14v12H38v14H26V38H12V26h14z" fill="#ffffff"/>
  <!-- Red germ / pathogen conveying "infection", offset to the lower right -->
  <g transform="translate(44 44)" fill="#d5281b">
    <!-- Spikes around the body -->
    <g stroke="#d5281b" stroke-width="2.4" stroke-linecap="round">
      <line x1="0"  y1="-13" x2="0"  y2="-8"/>
      <line x1="0"  y1="13"  x2="0"  y2="8"/>
      <line x1="-13" y1="0"  x2="-8" y2="0"/>
      <line x1="13"  y1="0"  x2="8"  y2="0"/>
      <line x1="-9" y1="-9"  x2="-6" y2="-6"/>
      <line x1="9"  y1="-9"  x2="6"  y2="-6"/>
      <line x1="-9" y1="9"   x2="-6" y2="6"/>
      <line x1="9"  y1="9"   x2="6"  y2="6"/>
    </g>
    <circle r="8" fill="#d5281b" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Small highlights on the germ body -->
    <circle cx="-2.5" cy="-2" r="1.3" fill="#ffffff"/>
    <circle cx="2.5"  cy="1.5" r="1"   fill="#ffffff"/>
  </g>
</svg>
